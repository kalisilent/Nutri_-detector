name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nutriscan
          POSTGRES_PASSWORD: nutriscan
          POSTGRES_DB: nutriscan_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint
        working-directory: backend
        run: ruff check app/ tests/ || true

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://nutriscan:nutriscan@localhost:5432/nutriscan_test
          SECRET_KEY: ci-test-key
          USE_LOCAL_STORAGE: "true"
        run: pytest tests/test_parsers.py tests/test_security.py -v

  mobile:
    name: Flutter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze || true

      - name: Test
        working-directory: mobile
        run: flutter test
