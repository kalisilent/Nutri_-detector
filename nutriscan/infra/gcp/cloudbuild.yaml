# Cloud Build pipeline: test → build → push → deploy.
# Trigger this from the GCP console on every push to main.
substitutions:
  _REGION: us-central1
  _SERVICE: nutriscan-api
  _REPO: nutriscan
  _DB_INSTANCE: nutriscan-db          # Cloud SQL instance connection name suffix

steps:
  # 1. Tests
  - name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        cd backend
        pip install -r requirements.txt -q
        pip install pytest -q
        pytest -q

  # 2. Build image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:latest
      - backend/

  # 3. Push
  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags,
           "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api"]

  # 4. Migrate database (Cloud Run Job)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - nutriscan-migrate
      - --region=${_REGION}
      - --wait

  # 5. Deploy API
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --cpu=2
      - --memory=2Gi
      - --min-instances=0
      - --max-instances=10
      - --concurrency=40
      - --timeout=120
      - --set-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}
      - --set-secrets=SECRET_KEY=jwt-secret:latest,DATABASE_URL=db-url:latest,LLM_API_KEY=llm-key:latest
      - --set-env-vars=ENV=production,USE_LOCAL_STORAGE=false,GCS_BUCKET=nutriscan-scans

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:${SHORT_SHA}"
