name: nutriscan
description: Scan food packets, understand ingredients, get health grades — fully offline.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0
  hive_flutter: ^1.1.0
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  package_info_plus: ^8.0.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ml/
